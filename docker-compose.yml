version: "3.9"

# ============================================================
# NutriAI Health Portal - Local Development Docker Compose
# Usage:
#   REGISTRY=nutriai_acr docker compose up --build
# Default registry is nutriai_acr; override with REGISTRY env var.
# In production, REGISTRY should be your ACR login server:
#   e.g. REGISTRY=nutriaiacr.azurecr.io
# ============================================================

services:

  # ============================================================
  # Infrastructure (local only — use managed Azure services in AKS)
  # ============================================================

  postgres:
    image: postgres:16-alpine
    container_name: nutriai-postgres
    environment:
      POSTGRES_USER: nutriai_user
      POSTGRES_PASSWORD: nutriai_password
      POSTGRES_DB: nutriai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nutriai_user -d nutriai" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nutriai-network

  redis:
    image: redis:7-alpine
    container_name: nutriai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nutriai-network

  # ============================================================
  # Microservices
  # ============================================================

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    image: ${REGISTRY:-nutriai_acr}/api-gateway:latest
    container_name: nutriai-api-gateway
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://nutriai_user:nutriai_password@postgres:5432/nutriai
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-jwt-key-for-development}
      - AUTH_SERVICE_URL=http://auth-service:8001
      - DOCUMENT_SERVICE_URL=http://document-service:8002
      - DIET_SERVICE_URL=http://diet-service:8003
      - HEALTH_SERVICE_URL=http://health-service:8004
      - NOTIFICATION_SERVICE_URL=http://notification-service:8005
      - PROFILE_SERVICE_URL=http://profile-service:8006
      - ADMIN_SERVICE_URL=http://admin-service:8007
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - nutriai-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    image: ${REGISTRY:-nutriai_acr}/auth-service:latest
    container_name: nutriai-auth-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://nutriai_user:nutriai_password@postgres:5432/nutriai
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-jwt-key-for-development}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRY_MINUTES=1440
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID:-}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET:-}
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID:-}
      - ENTRA_REDIRECT_URI=http://localhost:8000/auth/microsoft/callback
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nutriai-network

  document-service:
    build:
      context: ./services/document-service
      dockerfile: Dockerfile
    image: ${REGISTRY:-nutriai_acr}/document-service:latest
    container_name: nutriai-document-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://nutriai_user:nutriai_password@postgres:5432/nutriai
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-}
      - AZURE_STORAGE_CONTAINER_NAME=${AZURE_STORAGE_CONTAINER_NAME:-nutriai-documents}
      - AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT=${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      - AZURE_DOCUMENT_INTELLIGENCE_KEY=${AZURE_DOCUMENT_INTELLIGENCE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nutriai-network

  diet-service:
    build:
      context: ./services/diet-service
      dockerfile: Dockerfile
    image: ${REGISTRY:-nutriai_acr}/diet-service:latest
    container_name: nutriai-diet-service
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://nutriai_user:nutriai_password@postgres:5432/nutriai
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY:-}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME:-gpt-4}
      - AZURE_OPENAI_API_VERSION=2024-02-01
      - AZURE_SERVICE_BUS_CONNECTION_STRING=${AZURE_SERVICE_BUS_CONNECTION_STRING:-}
      - AZURE_SERVICE_BUS_TOPIC_NAME=meal-reminders
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nutriai-network

  health-service:
    build:
      context: ./services/health-service
      dockerfile: Dockerfile
    image: ${REGISTRY:-nutriai_acr}/health-service:latest
    container_name: nutriai-health-service
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://nutriai_user:nutriai_password@postgres:5432/nutriai
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nutriai-network

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    image: ${REGISTRY:-nutriai_acr}/notification-service:latest
    container_name: nutriai-notification-service
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql://nutriai_user:nutriai_password@postgres:5432/nutriai
      - AZURE_SERVICE_BUS_CONNECTION_STRING=${AZURE_SERVICE_BUS_CONNECTION_STRING:-}
      - AZURE_SERVICE_BUS_TOPIC_NAME=meal-reminders
      - AZURE_SERVICE_BUS_SUBSCRIPTION_NAME=email-sender
      - EMAIL_PROVIDER=smtp
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - APP_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nutriai-network

  profile-service:
    build:
      context: ./services/profile-service
      dockerfile: Dockerfile
    image: ${REGISTRY:-nutriai_acr}/profile-service:latest
    container_name: nutriai-profile-service
    ports:
      - "8006:8006"
    environment:
      - DATABASE_URL=postgresql://nutriai_user:nutriai_password@postgres:5432/nutriai
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nutriai-network

  admin-service:
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile
    image: ${REGISTRY:-nutriai_acr}/admin-service:latest
    container_name: nutriai-admin-service
    ports:
      - "8007:8007"
    environment:
      - DATABASE_URL=postgresql://nutriai_user:nutriai_password@postgres:5432/nutriai
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nutriai-network

  # ============================================================
  # Frontend
  # ============================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${REGISTRY:-nutriai_acr}/frontend:latest
    container_name: nutriai-frontend
    ports:
      - "3000:80"
    environment:
      - BACKEND_URL=http://api-gateway:8000
    depends_on:
      - api-gateway
    networks:
      - nutriai-network

volumes:
  postgres_data:
  redis_data:

networks:
  nutriai-network:
    driver: bridge
