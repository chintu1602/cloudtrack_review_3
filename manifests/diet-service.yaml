---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: diet-service
  namespace: nutriai
  labels:
    app: diet-service
    app.kubernetes.io/part-of: nutriai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diet-service
  template:
    metadata:
      labels:
        app: diet-service
    spec:
      containers:
        - name: diet-service
          image: nutriaiacr1602.azurecr.io/diet-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: diet-service-secrets
                  key: DATABASE_URL
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: diet-service-secrets
                  key: AZURE_OPENAI_ENDPOINT
            - name: AZURE_OPENAI_KEY
              valueFrom:
                secretKeyRef:
                  name: diet-service-secrets
                  key: AZURE_OPENAI_KEY
            - name: AZURE_OPENAI_DEPLOYMENT_NAME
              value: "gpt-4"
            - name: AZURE_OPENAI_API_VERSION
              value: "2024-02-01"
            - name: AZURE_SERVICE_BUS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: diet-service-secrets
                  key: AZURE_SERVICE_BUS_CONNECTION_STRING
            - name: AZURE_SERVICE_BUS_TOPIC_NAME
              value: "meal-reminders"
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "diet-service-secret-provider"
---
apiVersion: v1
kind: Service
metadata:
  name: diet-service
  namespace: nutriai
spec:
  selector:
    app: diet-service
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: diet-service-hpa
  namespace: nutriai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: diet-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
