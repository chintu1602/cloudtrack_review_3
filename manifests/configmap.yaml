apiVersion: v1
kind: ConfigMap
metadata:
  name: nutriai-config
  namespace: nutriai
data:
  # Azure OpenAI settings
  AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4"
  AZURE_OPENAI_API_VERSION: "2024-02-01"

  # Azure Storage settings
  AZURE_STORAGE_CONTAINER_NAME: "nutriai-documents"

  # Azure Service Bus settings
  AZURE_SERVICE_BUS_TOPIC_NAME: "meal-reminders"
  AZURE_SERVICE_BUS_SUBSCRIPTION_NAME: "email-sender"

  # SMTP settings (non-sensitive)
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_FROM_EMAIL: "noreply@nutriai-health.com"

  # Application configurations
  APP_URL: "https://nutriai.example.com"

  # Internal microservice URLs (Kubernetes DNS resolved within nutriai namespace)
  AUTH_SERVICE_URL:         "http://auth-service:8001"
  DOCUMENT_SERVICE_URL:     "http://document-service:8002"
  DIET_SERVICE_URL:         "http://diet-service:8003"
  HEALTH_SERVICE_URL:       "http://health-service:8004"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8005"
  PROFILE_SERVICE_URL:      "http://profile-service:8006"
  ADMIN_SERVICE_URL:        "http://admin-service:8007"

  # Frontend backend API endpoint proxy URL
  BACKEND_URL: "http://api-gateway:8000"
