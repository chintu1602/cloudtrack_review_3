---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
  namespace: nutriai
  labels:
    app: document-service
    app.kubernetes.io/part-of: nutriai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: document-service
  template:
    metadata:
      labels:
        app: document-service
    spec:
      containers:
        - name: document-service
          image: nutriai_acr/document-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nutriai-secrets
                  key: DATABASE_URL
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: nutriai-secrets
                  key: AZURE_STORAGE_CONNECTION_STRING
            - name: AZURE_STORAGE_CONTAINER_NAME
              valueFrom:
                configMapKeyRef:
                  name: nutriai-config
                  key: AZURE_STORAGE_CONTAINER_NAME
            - name: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: nutriai-secrets
                  key: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
            - name: AZURE_DOCUMENT_INTELLIGENCE_KEY
              valueFrom:
                secretKeyRef:
                  name: nutriai-secrets
                  key: AZURE_DOCUMENT_INTELLIGENCE_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: document-service
  namespace: nutriai
spec:
  selector:
    app: document-service
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
