---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: nutriai
  labels:
    app: auth-service
    app.kubernetes.io/part-of: nutriai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: nutriai_acr/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nutriai-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nutriai-secrets
                  key: JWT_SECRET_KEY
            - name: ENTRA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: nutriai-secrets
                  key: ENTRA_CLIENT_ID
            - name: ENTRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nutriai-secrets
                  key: ENTRA_CLIENT_SECRET
            - name: ENTRA_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: nutriai-secrets
                  key: ENTRA_TENANT_ID
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: nutriai
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
