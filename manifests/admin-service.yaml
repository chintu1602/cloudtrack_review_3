---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: nutriai
  labels:
    app: admin-service
    app.kubernetes.io/part-of: nutriai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: nutriai-service-account
      containers:
        - name: admin-service
          image: nutriaiacr1602.azurecr.io/admin-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8007
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: admin-service-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8007
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8007
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "admin-service-secret-provider"
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: nutriai
spec:
  selector:
    app: admin-service
  ports:
    - port: 8007
      targetPort: 8007
  type: ClusterIP
