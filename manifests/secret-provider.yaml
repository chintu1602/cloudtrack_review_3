apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: api-gateway-secret-provider
  namespace: nutriai
spec:
  provider: azure
  secretObjects:
  - secretName: api-gateway-secrets
    type: Opaque
    data:
    - objectName: database-url
      key: DATABASE_URL
    - objectName: jwt-secret-key
      key: JWT_SECRET_KEY
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "your-identity-client-id"
    keyvaultName: "nutriai-kv-1602"
    objects:  |
      array:
        - |
          objectName: database-url
          objectType: secret
        - |
          objectName: jwt-secret-key
          objectType: secret
    tenantId: "placeholder-entra-tenant-id"
---
