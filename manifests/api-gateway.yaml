---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nutriai
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: nutriai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: nutriai_acr/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nutriai-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nutriai-secrets
                  key: JWT_SECRET_KEY
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: nutriai-config
                  key: AUTH_SERVICE_URL
            - name: DOCUMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: nutriai-config
                  key: DOCUMENT_SERVICE_URL
            - name: DIET_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: nutriai-config
                  key: DIET_SERVICE_URL
            - name: HEALTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: nutriai-config
                  key: HEALTH_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: nutriai-config
                  key: NOTIFICATION_SERVICE_URL
            - name: PROFILE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: nutriai-config
                  key: PROFILE_SERVICE_URL
            - name: ADMIN_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: nutriai-config
                  key: ADMIN_SERVICE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nutriai
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
