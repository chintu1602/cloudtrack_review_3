---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nutriai
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: nutriai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: nutriaiacr1602.azurecr.io/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-gateway-secrets
                  key: JWT_SECRET_KEY
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8001"
            - name: DOCUMENT_SERVICE_URL
              value: "http://document-service:8002"
            - name: DIET_SERVICE_URL
              value: "http://diet-service:8003"
            - name: HEALTH_SERVICE_URL
              value: "http://health-service:8004"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8005"
            - name: PROFILE_SERVICE_URL
              value: "http://profile-service:8006"
            - name: ADMIN_SERVICE_URL
              value: "http://admin-service:8007"
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "api-gateway-secret-provider"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nutriai
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
