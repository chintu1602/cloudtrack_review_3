[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
logfile_maxbytes=50MB
logfile_backups=3
loglevel=info
pidfile=/var/run/supervisord.pid

[program:api-gateway]
command=uvicorn main:app --host 0.0.0.0 --port 8000
directory=/app/services/api-gateway
autostart=true
autorestart=true
stdout_logfile=/var/log/api-gateway.log
stderr_logfile=/var/log/api-gateway-error.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
priority=100

[program:auth-service]
command=uvicorn main:app --host 0.0.0.0 --port 8001
directory=/app/services/auth-service
autostart=true
autorestart=true
stdout_logfile=/var/log/auth-service.log
stderr_logfile=/var/log/auth-service-error.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
priority=200

