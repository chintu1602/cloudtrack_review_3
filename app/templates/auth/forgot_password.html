{% extends "base.html" %}
{% block title %}Forgot Password - NutriAI Health Portal{% endblock %}

{% block content %}
<div class="container py-5 page-content">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <i class="fas fa-lock text-primary-green" style="font-size: 2.5rem;"></i>
                    <h3 class="fw-bold mt-2">Reset Password</h3>
                    <p class="text-muted">Enter your email to receive a password reset link</p>
                </div>

                <form>
                    <div class="mb-3">
                        <label class="form-label-nutriai" for="email">Email Address</label>
                        <input type="email" class="form-control form-control-nutriai" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <button type="submit" class="btn btn-nutriai-primary w-100 py-2">
                        <i class="fas fa-paper-plane me-2"></i>Send Reset Link
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted mb-2" style="font-size: 0.88rem;">
                        <i class="fas fa-info-circle me-1"></i>If you signed in with Microsoft, use your organization's password reset.
                    </p>
                    <a href="/auth/login" style="font-size: 0.9rem;">
                        <i class="fas fa-arrow-left me-1"></i>Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
